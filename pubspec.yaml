name: robin_the_hood
description: "Robin the Hood - Educational chart pattern scanner and smart trading assistant for Robinhood users."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  shared_preferences: ^2.3.2
  http: ^1.2.2
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.2.1
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
